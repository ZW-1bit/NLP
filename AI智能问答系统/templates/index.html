<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 侧边栏 -->
    <aside id="sidebar">
        <div class="sidebar-head">
            <h2>对话</h2>
            <button id="btn-new" title="新建对话">+</button>
        </div>
        <ul id="session-list"></ul>
        <div class="sidebar-foot">
            <div class="mode-switch">
                <button id="btn-mode" class="mode-btn online" title="切换在线/离线模式">
                    <span class="mode-dot"></span>
                    <span class="mode-text">在线</span>
                </button>
            </div>
            <button id="btn-settings" title="设置">设置</button>
        </div>
    </aside>

    <!-- 主区域 -->
    <main id="main">
        <!-- 空状态 -->
        <div id="welcome" class="welcome">
            <h1>智能问答系统</h1>
            <p>基于 DeepSeek API，支持多轮对话、文档上传、自定义提示词</p>
            <div class="quick-questions">
                <button class="q-btn" data-q="什么是自然语言处理？">什么是自然语言处理？</button>
                <button class="q-btn" data-q="用Python写一个快速排序">用Python写一个快速排序</button>
                <button class="q-btn" data-q="解释Transformer架构">解释Transformer架构</button>
                <button class="q-btn" data-q="推荐几本NLP入门书籍">推荐几本NLP入门书籍</button>
            </div>
        </div>

        <!-- 聊天区 -->
        <div id="chat-area" class="chat-area hidden">
            <div id="messages"></div>
        </div>

        <!-- 输入区 -->
        <div class="input-bar">
            <label id="btn-upload" title="上传文档">
                📎
                <input type="file" id="file-input" accept=".txt,.md,.csv,.json,.py" hidden>
            </label>
            <input type="text" id="msg-input" placeholder="输入你的问题..." autocomplete="off">
            <button id="btn-mic" title="语音输入" style="display:none">🎤</button>
            <button id="btn-send">发送</button>
        </div>
    </main>

    <!-- 设置弹窗 -->
    <div id="modal" class="modal hidden">
        <div class="modal-box">
            <h3>会话设置</h3>
            <label>系统提示词</label>
            <textarea id="set-prompt" rows="4" placeholder="自定义AI的角色和行为..."></textarea>
            <label>模型</label>
            <select id="set-model">
                <option value="deepseek-chat">deepseek-chat</option>
                <option value="deepseek-reasoner">deepseek-reasoner</option>
            </select>
            <label>温度 <span id="temp-val">0.7</span></label>
            <input type="range" id="set-temp" min="0" max="1.5" step="0.1" value="0.7">
            <label>最大Token <span id="tok-val">1024</span></label>
            <input type="range" id="set-tok" min="256" max="4096" step="256" value="1024">
            <div class="modal-btns">
                <button id="btn-save">保存</button>
                <button id="btn-cancel">取消</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
